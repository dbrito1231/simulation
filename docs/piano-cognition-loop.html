<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PIANO cognition loop</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #ffffff;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e8; }
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
  .diagram-wrap { max-width: 680px; margin: 0 auto; }
  svg { width: 100%; height: auto; display: block; }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: currentColor; }
  .t { font-size: 14px; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; opacity: 0.7; }
  .box { fill: #f5f5f5; stroke: #ccc; stroke-width: 1; }
  .arr { stroke: #888; stroke-width: 1.5; }
  .c-blue rect { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1; }
  .c-blue text { fill: #1e3a5f; }
  .c-purple rect { fill: #ede9fe; stroke: #c4b5fd; stroke-width: 1; }
  .c-purple text { fill: #4c1d95; }
  @media (prefers-color-scheme: dark) {
    .box { fill: #2a2a2a; stroke: #555; }
    .arr { stroke: #999; }
    .c-blue rect { fill: #1e3a5f; stroke: #3b82f6; }
    .c-blue text { fill: #bfdbfe; }
    .c-purple rect { fill: #3b2a5f; stroke: #a78bfa; }
    .c-purple text { fill: #ddd6fe; }
  }
</style>
</head>
<body>
<div class="diagram-wrap">
<h1>PIANO cognition loop in this repo</h1>
<svg width="100%" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
<title>PIANO cognition loop in this repo</title>
<desc>Flowchart: the SimEngine tick loop snapshots agent context, fans out to four staggered PIANO modules (Perception, Desire, Social, Reflection) on a dedicated worker pool, joins their one-sentence reports, and feeds them to the Cognitive Controller decision call, whose validated JSON decision mutates the world under the engine lock before the next tick.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-blue"><rect x="240" y="34" width="12" height="12" rx="3"/></g>
<text class="ts" x="258" y="45">piano_workers pool (2)</text>
<g class="c-purple"><rect x="410" y="34" width="12" height="12" rx="3"/></g>
<text class="ts" x="428" y="45">decision pool (3)</text>
<g class="box"><rect x="190" y="62" width="300" height="52" rx="8" class="box"/></g>
<text class="th" x="340" y="84" text-anchor="middle">SimEngine tick loop</text>
<text class="ts" x="340" y="102" text-anchor="middle">30/s; think timer fires</text>
<line x1="340" y1="114" x2="340" y2="140" class="arr" marker-end="url(#arrow)"/>
<rect x="190" y="142" width="300" height="52" rx="8" class="box"/>
<text class="th" x="340" y="164" text-anchor="middle">Snapshot under lock</text>
<text class="ts" x="340" y="182" text-anchor="middle">payload + compact context</text>
<line x1="340" y1="194" x2="340" y2="218" class="arr" marker-end="url(#arrow)"/>
<rect x="30" y="222" width="620" height="118" rx="10" fill="none" stroke="currentColor" stroke-width="0.75" stroke-dasharray="4 4" opacity="0.5"/>
<text class="ts" x="44" y="242">Module fan-out — MODEL_FAST, 15 s timeout</text>
<g class="c-blue"><rect x="44" y="256" width="140" height="64" rx="8"/><text class="th" x="114" y="282" text-anchor="middle">Perception</text><text class="ts" x="114" y="300" text-anchor="middle">every tick</text></g>
<g class="c-blue"><rect x="196" y="256" width="140" height="64" rx="8"/><text class="th" x="266" y="282" text-anchor="middle">Desire</text><text class="ts" x="266" y="300" text-anchor="middle">every tick</text></g>
<g class="c-blue"><rect x="348" y="256" width="140" height="64" rx="8"/><text class="th" x="418" y="282" text-anchor="middle">Social</text><text class="ts" x="418" y="300" text-anchor="middle">every 2nd tick</text></g>
<g class="c-blue"><rect x="500" y="256" width="140" height="64" rx="8"/><text class="th" x="570" y="282" text-anchor="middle">Reflection</text><text class="ts" x="570" y="300" text-anchor="middle">every 3rd tick</text></g>
<line x1="114" y1="340" x2="310" y2="372" class="arr" marker-end="url(#arrow)"/>
<line x1="266" y1="340" x2="330" y2="372" class="arr" marker-end="url(#arrow)"/>
<line x1="418" y1="340" x2="350" y2="372" class="arr" marker-end="url(#arrow)"/>
<line x1="570" y1="340" x2="370" y2="372" class="arr" marker-end="url(#arrow)"/>
<rect x="190" y="376" width="300" height="52" rx="8" class="box"/>
<text class="th" x="340" y="398" text-anchor="middle">Module reports</text>
<text class="ts" x="340" y="416" text-anchor="middle">joined; cache fills off-ticks</text>
<line x1="340" y1="428" x2="340" y2="454" class="arr" marker-end="url(#arrow)"/>
<g class="c-purple"><rect x="190" y="456" width="300" height="52" rx="8"/><text class="th" x="340" y="478" text-anchor="middle">Cognitive Controller</text><text class="ts" x="340" y="496" text-anchor="middle">weighs reports, one JSON</text></g>
<line x1="340" y1="508" x2="340" y2="534" class="arr" marker-end="url(#arrow)"/>
<rect x="190" y="536" width="300" height="52" rx="8" class="box"/>
<text class="th" x="340" y="558" text-anchor="middle">Validate decision</text>
<text class="ts" x="340" y="576" text-anchor="middle">normalize or role fallback</text>
<line x1="340" y1="588" x2="340" y2="614" class="arr" marker-end="url(#arrow)"/>
<rect x="190" y="616" width="300" height="52" rx="8" class="box"/>
<text class="th" x="340" y="638" text-anchor="middle">apply_decision()</text>
<text class="ts" x="340" y="656" text-anchor="middle">mutates world under lock</text>
<path d="M190 642 L100 642 Q88 642 88 630 L88 100 Q88 88 100 88 L186 88" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="96" y="370" transform="rotate(-90 96 370)" text-anchor="middle">next tick</text>
</svg>
</div>
</body>
</html>
